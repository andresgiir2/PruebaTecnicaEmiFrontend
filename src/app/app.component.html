<div class="app-shell">
  <header class="app-shell__header navbar navbar-expand-lg">
    <div class="container-xl app-shell__header-inner px-0">
      <a routerLink="/tasks" class="navbar-brand app-shell__brand">EMI Task Management</a>

      <nav class="navbar-nav flex-row flex-wrap gap-2 mx-auto">
        <a class="nav-link app-shell__link" routerLink="/tasks" routerLinkActive="app-shell__link--active" [routerLinkActiveOptions]="{ exact: true }">Tasks</a>
        <a class="nav-link app-shell__link" routerLink="/tasks/new" routerLinkActive="app-shell__link--active">New task</a>
        <a class="nav-link app-shell__link" routerLink="/states" routerLinkActive="app-shell__link--active">States</a>
      </nav>
    </div>
  </header>

  <main class="app-shell__content container-xl py-4">
    <router-outlet />
  </main>
</div>
